<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacuum Head Pogo Orb Asset Preview</title>
    <style>
      :root {
        color: #17121f;
        background: #fff4c4;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      #root {
        width: 100vw;
        height: 100vh;
      }

      .preview-shell {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        background: #fff4c4;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(170px, 1fr) repeat(8, max-content);
        align-items: end;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 4px solid #17121f;
        background: #f7df7e;
        box-shadow: 0 4px 0 #2c2336;
        z-index: 2;
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 170px;
      }

      .title strong {
        font-size: 14px;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .title span {
        color: #47344f;
        font-size: 11px;
        font-weight: 700;
      }

      .nav-link {
        width: fit-content;
        margin-top: 4px;
        border: 3px solid #17121f;
        background: #78ffe2;
        box-shadow: 3px 3px 0 #2c2336;
        color: #17121f;
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        padding: 6px 8px;
        text-decoration: none;
        text-transform: uppercase;
      }

      .nav-link:hover {
        background: #fff7cf;
      }

      .control {
        display: grid;
        gap: 3px;
        min-width: 78px;
      }

      .control label {
        color: #332742;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
      }

      select,
      .range-readout,
      .toggle {
        min-height: 32px;
        border: 3px solid #17121f;
        background: #fff7cf;
        color: #17121f;
        box-shadow: 3px 3px 0 #2c2336;
        font-size: 11px;
        font-weight: 900;
      }

      select {
        max-width: 134px;
        padding: 0 8px;
        cursor: pointer;
      }

      #animation-control {
        max-width: 178px;
        min-width: 178px;
      }

      input[type="range"] {
        width: 92px;
        accent-color: #00b7d8;
      }

      .range-readout {
        min-width: 46px;
        display: grid;
        place-items: center;
        padding: 0 6px;
      }

      .inline-range {
        display: grid;
        grid-template-columns: 92px 46px;
        align-items: center;
        gap: 6px;
      }

      .toggle {
        min-width: 62px;
        padding: 0 10px;
        cursor: pointer;
      }

      .toggle[aria-pressed="true"] {
        background: #78ffe2;
      }

      .stage {
        position: relative;
        min-height: 0;
      }

      .stage.is-checker {
        background-color: #e9f6ee;
        background-image:
          linear-gradient(45deg, rgba(23, 18, 31, 0.08) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(23, 18, 31, 0.08) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(23, 18, 31, 0.08) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(23, 18, 31, 0.08) 75%);
        background-position:
          0 0,
          0 12px,
          12px -12px,
          -12px 0;
        background-size: 24px 24px;
      }

      .badge {
        position: absolute;
        left: 14px;
        bottom: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        pointer-events: none;
      }

      .badge span {
        border: 3px solid #17121f;
        background: rgba(255, 247, 207, 0.95);
        padding: 7px 9px;
        color: #17121f;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
        box-shadow: 3px 3px 0 #2c2336;
      }

      @media (max-width: 1100px) {
        body {
          overflow: auto;
        }

        .preview-shell {
          min-height: 100vh;
          grid-template-rows: auto minmax(520px, 1fr);
        }

        .toolbar {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          align-items: end;
        }

        .title {
          grid-column: 1 / -1;
        }

        .control,
        select,
        input[type="range"] {
          width: 100%;
          min-width: 0;
          max-width: none;
        }

        .inline-range {
          grid-template-columns: minmax(0, 1fr) 46px;
        }
      }

      @media (max-width: 640px) {
        .toolbar {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .preview-shell {
          grid-template-rows: auto minmax(460px, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
