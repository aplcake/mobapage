<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacuum Head Pogo Orb V2 Long Approach</title>
    <style>
      :root {
        color: #17121f;
        background: #b8d2a7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
      }

      #root {
        width: 100vw;
        height: 100vh;
      }

      .control-room {
        position: relative;
        width: 100%;
        height: 100%;
        background: #b8d2a7;
        user-select: none;
      }

      .control-room canvas {
        touch-action: none;
      }

      .room-hud,
      .legend-panel,
      .camera-pad,
      .frame-rate-panel,
      .mobile-controls,
      .room-links {
        position: absolute;
        z-index: 2;
      }

      .room-hud {
        left: 14px;
        bottom: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: calc(100vw - 210px);
        pointer-events: none;
      }

      .room-hud span,
      .legend-panel,
      .camera-pad button,
      .frame-rate-panel button,
      .room-links a {
        border: 3px solid #17121f;
        background: rgba(255, 248, 205, 0.95);
        box-shadow: 3px 3px 0 #2c2336;
        color: #17121f;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
      }

      .room-hud span {
        min-width: 66px;
        padding: 8px 9px;
        text-align: center;
        white-space: nowrap;
      }

      .legend-panel {
        top: 14px;
        left: 14px;
        width: min(360px, calc(100vw - 150px));
        padding: 10px 12px;
        pointer-events: none;
      }

      .legend-panel strong {
        display: block;
        margin-bottom: 7px;
        font-size: 12px;
      }

      .legend-panel p {
        margin: 0;
        font-size: 11px;
        line-height: 1.45;
        text-transform: none;
      }

      .room-links {
        top: 14px;
        right: 14px;
        display: flex;
        gap: 8px;
      }

      .room-links a {
        display: block;
        padding: 8px 10px;
        text-decoration: none;
      }

      .room-links a:hover,
      .camera-pad button:hover,
      .camera-pad button.is-active,
      .frame-rate-panel button:hover,
      .frame-rate-panel button.is-active {
        background: #78ffe2;
      }

      .camera-pad {
        top: 58px;
        right: 14px;
        display: grid;
        grid-template-columns: repeat(3, 34px);
        gap: 6px;
      }

      .camera-pad button {
        width: 34px;
        height: 32px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 0;
      }

      .camera-pad button:nth-child(4) {
        grid-column: 1;
      }

      .camera-pad button:nth-child(5) {
        grid-column: 2;
      }

      .camera-pad button:nth-child(6) {
        grid-column: 3;
      }

      .frame-rate-panel {
        top: 136px;
        right: 14px;
      }

      .frame-rate-panel button {
        min-width: 94px;
        height: 32px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 0 10px;
      }

      .mobile-controls {
        display: none;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .mobile-stick,
      .mobile-action-cluster {
        pointer-events: auto;
        touch-action: none;
      }

      .mobile-stick {
        position: absolute;
        left: 22px;
        bottom: 24px;
        width: 144px;
        height: 144px;
        border: 4px solid #17121f;
        border-radius: 50%;
        background:
          radial-gradient(circle at 38% 34%, rgba(255, 255, 255, 0.42), transparent 0 34%),
          rgba(255, 248, 205, 0.72);
        box-shadow: 5px 5px 0 #2c2336, inset 0 -12px 0 rgba(90, 122, 75, 0.16);
      }

      .mobile-stick-ring {
        position: absolute;
        inset: 22px;
        border: 3px dashed rgba(23, 18, 31, 0.38);
        border-radius: 50%;
      }

      .mobile-stick-thumb {
        position: absolute;
        left: calc(50% - 28px);
        top: calc(50% - 28px);
        width: 56px;
        height: 56px;
        border: 4px solid #17121f;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.78), transparent 0 30%),
          linear-gradient(145deg, #78ffe2, #d5ff6b 54%, #ff84d8);
        box-shadow: 4px 4px 0 #2c2336;
        will-change: transform;
      }

      .mobile-stick.is-active {
        background:
          radial-gradient(circle at 38% 34%, rgba(255, 255, 255, 0.54), transparent 0 34%),
          rgba(120, 255, 226, 0.62);
      }

      .mobile-action-cluster {
        position: absolute;
        right: 22px;
        bottom: 24px;
        display: grid;
        grid-template-columns: 72px 92px;
        grid-template-rows: 52px 82px;
        align-items: end;
        gap: 10px;
      }

      .mobile-action-button {
        border: 4px solid #17121f;
        border-radius: 999px;
        background: rgba(255, 248, 205, 0.92);
        box-shadow: 4px 4px 0 #2c2336;
        color: #17121f;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 950;
        line-height: 1;
        text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
      }

      .mobile-action-button:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 #2c2336;
      }

      .mobile-action-run {
        grid-column: 1;
        grid-row: 1 / span 2;
        width: 72px;
        height: 72px;
        background: #ffe27d;
      }

      .mobile-action-jump {
        grid-column: 2;
        grid-row: 2;
        width: 92px;
        height: 92px;
        background: #78ffe2;
        font-size: 13px;
      }

      .mobile-action-reset {
        grid-column: 2;
        grid-row: 1;
        width: 76px;
        height: 48px;
        justify-self: end;
        border-width: 3px;
        background: rgba(255, 182, 226, 0.92);
        box-shadow: 3px 3px 0 #2c2336;
        font-size: 10px;
      }

      @media (max-width: 760px) {
        .legend-panel {
          display: none;
        }

        .room-hud {
          left: 8px;
          right: 8px;
          bottom: auto;
          top: 8px;
          gap: 5px;
          max-width: calc(100vw - 132px);
        }

        .room-hud span {
          min-width: 54px;
          border-width: 2px;
          box-shadow: 2px 2px 0 #2c2336;
          font-size: 10px;
          padding: 6px 7px;
        }

        .room-links {
          top: 8px;
          right: 8px;
        }

        .camera-pad {
          top: 48px;
          right: 8px;
          transform: scale(0.9);
          transform-origin: top right;
        }

        .frame-rate-panel {
          top: 126px;
          right: 8px;
          transform: scale(0.9);
          transform-origin: top right;
        }
      }

      @media (hover: none), (pointer: coarse), (max-width: 760px) {
        .mobile-controls {
          display: block;
        }

        .room-hud {
          bottom: auto;
          top: 8px;
          max-width: calc(100vw - 132px);
        }
      }

      @media (max-width: 520px) {
        .mobile-stick {
          left: 14px;
          bottom: 18px;
          width: 126px;
          height: 126px;
          border-width: 3px;
          box-shadow: 4px 4px 0 #2c2336, inset 0 -10px 0 rgba(90, 122, 75, 0.16);
        }

        .mobile-stick-ring {
          inset: 18px;
          border-width: 2px;
        }

        .mobile-stick-thumb {
          left: calc(50% - 24px);
          top: calc(50% - 24px);
          width: 48px;
          height: 48px;
          border-width: 3px;
        }

        .mobile-action-cluster {
          right: 14px;
          bottom: 18px;
          grid-template-columns: 62px 82px;
          grid-template-rows: 46px 74px;
          gap: 8px;
        }

        .mobile-action-run {
          width: 62px;
          height: 62px;
        }

        .mobile-action-jump {
          width: 82px;
          height: 82px;
        }

        .mobile-action-reset {
          width: 68px;
          height: 42px;
        }
      }

      @media (max-height: 560px) {
        .room-hud span:nth-child(n + 7) {
          display: none;
        }

        .mobile-stick {
          bottom: 12px;
          transform: scale(0.82);
          transform-origin: bottom left;
        }

        .mobile-action-cluster {
          bottom: 12px;
          transform: scale(0.84);
          transform-origin: bottom right;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/control.tsx"></script>
  </body>
</html>
